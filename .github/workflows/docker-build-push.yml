name: Docker Build & Push

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry (ex: ghcr.io)'
        type: string
        default: 'ghcr.io'
      image-name:
        description: 'Nome completo da imagem sem registry (ex: owner/app)'
        type: string
        required: true
      context:
        description: 'Docker build context (diretório)'
        type: string
        required: true
      artifact-name:
        description: 'Nome do artefato baixado antes do build'
        type: string
        required: true
      artifact-path:
        description: 'Destino do artefato no filesystem'
        type: string
        required: true
      latest-branch:
        description: 'Branch que publica a tag latest'
        type: string
        required: true
    outputs:
      sha:
        description: 'SHA curto do commit — usado como tag da imagem publicada'
        value: ${{ jobs.docker.outputs.sha }}
    secrets:
      registry-token:
        description: 'Token de autenticação no registry'
        required: true

jobs:
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download artefato do job de build
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}

      - name: Extrair SHA curto
        id: image
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login no registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', inputs.latest-branch) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build e push da imagem
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max