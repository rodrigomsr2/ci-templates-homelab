name: Java Gradle Build

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repositório da aplicação (ex: owner/app)'
        type: string
        required: true
      ref:
        description: 'SHA ou branch a fazer checkout'
        type: string
        required: true
      java-version:
        description: 'Versão do JDK'
        type: string
        default: '21'
      working-directory:
        description: 'Diretório raiz do projeto Gradle'
        type: string
        required: true
      artifact-name:
        description: 'Nome do artefato para upload'
        type: string
        required: true
      artifact-path:
        description: 'Glob path do JAR gerado'
        type: string
        required: true
      retention-days:
        description: 'Dias de retenção do artefato'
        type: number
        default: 1

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4.7.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build e testes
        working-directory: ${{ inputs.working-directory }}
        run: ./gradlew build --no-daemon

      - name: Upload JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.retention-days }}
